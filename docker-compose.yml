services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-learn-ai-service
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      TEMP_DIR: /app/tmp
      OLLAMA_BASE_URL: http://ollama:11434
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./tmp:/app/tmp
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: social-learn-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: social-learn-ollama-pull
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Waiting for Ollama...' &&
      until ollama list >/dev/null 2>&1; do
        sleep 3;
      done &&
      echo 'Pulling Qwen model...' &&
      ollama pull qwen3:1.7b &&
      echo 'Qwen3-1.7B pulled successfully'
      "
    restart: "no"

volumes:
  ollama_data:
  hf_cache: